<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Contact – Jietong Fu</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  </head>
  <body data-lang="en" data-page="contact">
    <nav class="navbar">
      <div class="logo">Jietong Fu</div>
      <ul>
        <li><a href="index.html">About</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="duo.html">Duo</a></li>
        <li><a href="contact.html" class="active-link">Contact</a></li>
      </ul>
      <div class="social-links"></div>
      <div class="lang-toggle"><a href="contact-cn.html">中文</a></div>
      <div class="hamburger"><span></span><span></span><span></span></div>
    </nav>

    <section class="page-intro">
      <div class="container">
        <h2 class="section-title" id="contact-title"></h2>
        <div class="contact-layout">
          <div class="contact-info">
            <p id="contact-intro"></p>
            <p><strong id="contact-email-label"></strong>: <a id="contact-email-link" href="#"></a></p>
            <p><strong id="contact-phone-label"></strong>: <a id="contact-phone-link" href="#"></a></p>
          </div>
          <form id="contact-form" name="contact" method="POST" action="/.netlify/functions/send-email" class="contact-form">
            <input type="hidden" id="form-lang" name="lang" value="en" />
            <p style="display:none;">
              <label><span id="honeypot-label"></span><input name="bot-field" /></label>
            </p>
            <label for="name" id="form-name-label"></label>
            <input type="text" id="name" name="name" required />
            <label for="email" id="form-email-label"></label>
            <input type="email" id="email" name="email" required />
            <label for="service" id="form-service-label"></label>
            <select id="service" name="service"></select>
            <label for="message" id="form-message-label"></label>
            <textarea id="message" name="message" rows="5" required></textarea>
            <button type="submit" id="form-submit-label"></button>
          </form>
        </div>
      </div>
    </section>

    <footer>&copy; <span id="footer-year"></span> <span id="footer-name"></span>. All rights reserved.</footer>
    <script src="js/scripts.js"></script>
  </body>
</html>
