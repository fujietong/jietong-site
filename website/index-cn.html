      <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>

    <!-- Hero Section -->
    <header
      class="hero"
      style="background-image: url('assets/images/B8634F1C-A718-45A8-87DD-EED80FFCCBD4_1_105_c.jpeg');"
    >
      <div class="hero-content">
        <h1>傅界童</h1>
        <p>声乐博士 • 抒情男高音</p>
      </div>
    </header>

    <!-- About Section -->
    <section id="about">
      <div class="container">
        <h2 class="section-title">关于我</h2>
        <div class="about">
          <!-- Display the vertical portrait in the About section -->
          <img
            src="assets/images/FDA1C0A6-796D-478E-8DA5-A98BE81E932F_1_105_c.jpeg"
            alt="傅界童肖像"
          />
          <div class="text" id="bio-text">
            <!-- 简介从 data/cn/bio.json 动态加载 -->
                        <div class="download-links">
              <!-- Use the Chinese resume and teaching philosophy documents provided by the user -->
              <a href="assets/docs/傅界童简历.pdf" target="_blank" download>
                简历下载
              </a>
              <a
                href="assets/docs/声乐教学理念.docx"
                target="_blank"
                download
              >
                教学理念
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer>
      &copy; 2025 傅界童。保留所有权利。
    </footer>

    <script src="js/scripts.js"></script>
    <script>
      fetch('data/cn/bio.json')
        .then(r => r.json())
        .then(data => {
          const container = document.getElementById('bio-text');
          ['p1','p2','p3','p4','p5'].forEach(key => {
            if (data[key]) {
              const p = document.createElement('p');
              p.textContent = data[key];
              container.insertBefore(p, container.querySelector('.download-links'));
            }
          });
        });
    </script>
  </body>
